name: gpg_global
description: GPG Gathering Place Global - Digital Sanctuary for YSA & BYU-Pathway community.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  google_fonts: ^8.0.2
  confetti: ^0.8.0
  http: ^1.2.2
  socket_io_client: ^3.0.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.5.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - GP_Global_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "GP_Global_logo.png"
  min_sdk_android: 21
